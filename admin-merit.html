<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merit Management | Admin Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div id="loader-wrapper"><div class="loader"></div></div>

    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar shadow-sm">
            <div class="p-4 mb-4 border-bottom text-center">
                <a href="admin-dashboard.html" class="navbar-brand d-flex align-items-center">
                    <img src="logo.jpeg" alt="logo" height="45" class="me-2">
                    <span class="fw-bold fs-5 text-dark">ADMIN PORTAL</span>
                </a>
            </div>
            <div class="nav flex-column">
                <a href="admin-dashboard.html" class="sidebar-link"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="admin-records.html" class="sidebar-link"><i class="fas fa-users"></i> Student Records</a>
                <a href="admin-merit.html" class="sidebar-link active"><i class="fas fa-list-ol"></i> Merit List Gen</a>
                <a href="admin-seats.html" class="sidebar-link"><i class="fas fa-chair"></i> Seat Management</a>
                <a href="admin-qr.html" class="sidebar-link"><i class="fas fa-qrcode"></i> Registration QR</a>
                <a href="admin-settings.html" class="sidebar-link"><i class="fas fa-cog"></i> Portal Settings</a>
                <a href="index.html" class="sidebar-link mt-5 text-danger border-top pt-3"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1">
            <header class="bg-white border-bottom p-3 sticky-top">
                <div class="container-fluid d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0">Merit List Generation</h5>
                    <div class="d-flex align-items-center">
                        <span class="badge bg-primary-teal px-3 py-2 rounded-pill me-3">Session 2024-25</span>
                    </div>
                </div>
            </header>

            <div class="p-4">
                <!-- Controls Card -->
                <div class="custom-card card border-0 p-4 mb-4">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Select Branch for Merit</label>
                            <select class="form-select" id="meritBranch">
                                <option value="all">All Branches (Combined)</option>
                                <option>Computer Science & Engineering</option>
                                <option>Mechanical Engineering</option>
                                <option>Civil Engineering</option>
                                <option>Pharmacy (D.Pharma)</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-primary-teal w-100 btn-pill" onclick="loadMeritTable()">
                                <i class="fas fa-sync-alt me-2"></i> Generate
                            </button>
                        </div>
                        <div class="col-md-2 offset-md-4 text-end">
                            <button class="btn btn-outline-success w-100 btn-pill" onclick="exportMerit()">
                                <i class="fas fa-file-excel me-2"></i> Export Excel
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Merit Table Card -->
                <div class="custom-card card border-0 p-0 overflow-hidden shadow-sm">
                    <div class="bg-primary text-white p-3 d-flex justify-content-between align-items-center">
                        <h6 class="mb-0 fw-bold">Live Merit Report (Bazpur US Nagar)</h6>
                        <small id="meritCount">0 Candidates Listed</small>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light text-uppercase small fw-bold text-muted">
                                <tr>
                                    <th class="ps-4">Rank</th>
                                    <th>Candidate Name</th>
                                    <th>JEEP Roll</th>
                                    <th class="text-primary">JEEP Rank</th>
                                    <th>Category</th>
                                    <th>Pref 1</th>
                                    <th>Pref 2</th>
                                    <th>Pref 3</th>
                                    <th class="text-end pe-4">Status</th>
                                </tr>
                            </thead>
                            <tbody id="meritTable">
                                <!-- Data injected by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        function loadMeritTable() {
            const branch = document.getElementById('meritBranch').value;
            const meritList = generateMeritList(branch);
            const tbody = document.getElementById('meritTable');
            const count = document.getElementById('meritCount');
            
            tbody.innerHTML = '';
            count.innerText = `${meritList.length} Candidates Listed`;

            if (meritList.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center py-5 text-muted">No registrations found for this category/branch.</td></tr>';
                return;
            }

            meritList.forEach((s, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="ps-4 fw-bold">#${index + 1}</td>
                    <td>
                        <div class="fw-bold">${s.fullName}</div>
                        <div class="xsmall text-muted">${s.fatherName}</div>
                    </td>
                    <td>${s.jeepRoll || 'N/A'}</td>
                    <td class="fw-bold text-primary">${s.jeepRank || 'N/A'}</td>
                    <td><span class="badge bg-secondary-soft text-dark">${s.category}</span></td>
                    <td class="small">${s.preferences?.[0] || 'N/A'}</td>
                    <td class="small text-muted">${s.preferences?.[1] || '-'}</td>
                    <td class="small text-muted">${s.preferences?.[2] || '-'}</td>
                    <td class="text-end pe-4">
                        <span class="badge rounded-pill ${s.status === 'Approved' ? 'bg-success' : (s.status === 'Rejected' ? 'bg-danger' : 'bg-warning')}">
                            ${s.status}
                        </span>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function exportMerit() {
            const branch = document.getElementById('meritBranch').value;
            const data = generateMeritList(branch);
            downloadFullCSV(data, `Merit_Report_${branch.replace(/\s+/g, '_')}_2024.csv`);
        }
        document.addEventListener('DOMContentLoaded', loadMeritTable);
    </script>
</body>
</html>
