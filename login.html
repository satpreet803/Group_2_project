<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Government Polytechnic Bazpur</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loading Animation -->
    <div id="loader-wrapper">
        <div class="loader"></div>
    </div>

    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="col-md-5">
            <div class="ms-auto">
                <a href="admin-login.html" class="btn btn-outline-primary btn-pill btn-sm px-3 me-2"><i class="fas fa-user-shield me-1"></i> Admin</a>
                <a href="index.html" class="btn btn-outline-secondary btn-pill px-4 btn-sm">Back to Home</a>
            </div>
            <div class="text-center mb-4">
                <a href="index.html" class="d-inline-flex align-items-center mb-4 text-decoration-none">
                    <img src="logo.jpeg" alt="logo" height="60" class="me-2">
                    <span class="fw-bold fs-4 text-dark" data-dynamic="college-name">Government Polytechnic Bazpur</span>
                </a>
                <h2 class="fw-bold">Student Portal Login</h2>
                <p class="text-secondary">Enter your Application ID and DOB to access your dashboard (<span data-dynamic="year">2024-25</span>)</p>
            </div>
            
            <div class="custom-card card p-4 p-md-5">
                <form id="loginForm">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Application ID</label>
                        <div class="input-group">
                            <span class="input-group-text bg-teal-soft border-primary border-end-0"><i class="fas fa-id-card text-teal"></i></span>
                            <input type="text" class="form-control border-primary border-start-0 ps-0" id="appID" placeholder="GPB-2024-XXXX" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Date of Birth</label>
                        <div class="input-group">
                            <span class="input-group-text bg-teal-soft border-primary border-end-0"><i class="fas fa-calendar-alt text-teal"></i></span>
                            <input type="date" class="form-control border-primary border-start-0 ps-0" id="dob" required>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary-teal btn-pill py-3 fw-bold">Login to Account <i class="fas fa-sign-in-alt ms-2"></i></button>
                    </div>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="small text-secondary mb-0">Don't have an application ID? <a href="register.html" class="text-primary-teal fw-bold text-decoration-none">Register Now</a></p>
                </div>
            </div>
            <div class="text-center mt-4">
                <a href="index.html" class="text-secondary small text-decoration-none"><i class="fas fa-arrow-left me-1"></i> Back to Homepage</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Logging in...';
            btn.disabled = true;

            setTimeout(() => {
                const enteredID = document.getElementById('appID').value;
                const storedID = localStorage.getItem('studentAppID');

                // Simulation: Accept any valid format or the stored one
                if (enteredID.startsWith('GPB-') || enteredID === storedID) {
                    showToast('Login Successful!', 'success');
                    // Store dummy name if not exists
                    if (!localStorage.getItem('studentName')) {
                        localStorage.setItem('studentName', 'Demo Student');
                        localStorage.setItem('studentAppID', enteredID);
                        localStorage.setItem('studentAppStatus', 'Verified');
                    }
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    showToast('Invalid Application ID or DOB', 'danger');
                    btn.innerHTML = 'Login to Account <i class="fas fa-sign-in-alt ms-2"></i>';
                    btn.disabled = false;
                }
            }, 1200);
        });
    </script>
</body>
</html>
